global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "leaky_service"
    static_configs:
      - targets: ["leaky_service:8080"]

  - job_name: "flaky_service"
    static_configs:
      - targets: ["flaky_service:8081"]

  - job_name: "healer"
    static_configs:
      - targets: ["healer:8000"]
